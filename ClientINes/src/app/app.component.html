<app-header></app-header>

<main class="content">
  <router-outlet></router-outlet>
</main>

<app-footer></app-footer>

@if (modal.activeModal === 'confirm' && modal.config) {
  <app-inest-modal
    [mode]="modal.config.mode"
    [title]="modal.config.title"
    [message]="modal.config.message"
    [name]="modal.config.name || ''"
    [confirmText]="modal.config.confirmText"
    [cancelText]="modal.config.cancelText"
    (confirmed)="modal.confirm($event)"
    (cancelled)="modal.close()">
  </app-inest-modal>
}

@if (modal.activeModal === 'sell' && modal.selectedItem) {
  <app-sell-modal
    [item]="modal.selectedItem"
    (close)="modal.close()"
    (confirm)="modal.confirm($event)">
  </app-sell-modal>
}

@if (modal.activeModal === 'lend' && modal.selectedItem) {
  <app-lend-item-modal
    [item]="modal.selectedItem"
    [isOpen]="true"
    (close)="modal.close()"
    (confirm)="modal.confirm($event)">
  </app-lend-item-modal>
}

@if (modal.activeModal === 'itemForm') {
  <app-item-form-modal
    [item]="modal.selectedItem"
    [parentId]="modal.currentParentId">
  </app-item-form-modal>
}

@if (modal.activeModal === 'locationForm') {
  <app-location-form-modal
    [location]="modal.selectedLocation"
    [parentId]="modal.currentParentId">
  </app-location-form-modal>
}
