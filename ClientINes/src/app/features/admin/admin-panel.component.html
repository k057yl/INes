<div class="admin-container">
  <div class="admin-grid">
    
    <div class="auth-card admin-card">
      <div class="card-header">
        <h3><i class="fa fa-tags"></i> {{ 'MANAGEMENT.TITLE_CATEGORY' | translate }}</h3>
        <button class="inest-action-btn" (click)="addCategory()" [title]="'SHARED.TOOLTIP_ADD' | translate">+</button>
      </div>
      <div class="admin-list">
        <div class="admin-list-item" *ngFor="let c of categories">
          <span class="name">{{ c.name }}</span>
          <div class="actions">
            <button class="inest-action-btn" (click)="renameCategory(c)" [title]="'SHARED.TOOLTIP_RENAME' | translate">📝</button>
            <button class="inest-action-btn is-danger" (click)="deleteCategory(c)" [title]="'SHARED.TOOLTIP_DELETE' | translate">❌</button>
          </div>
        </div>
      </div>
    </div>

    <div class="auth-card admin-card">
      <div class="card-header">
        <h3><i class="fa fa-share-nodes"></i> {{ 'MANAGEMENT.TITLE_PLATFORM' | translate }}</h3>
        <button class="inest-action-btn" (click)="addPlatform()" [title]="'SHARED.TOOLTIP_ADD' | translate">+</button>
      </div>
      <div class="admin-list">
        <div class="admin-list-item" *ngFor="let p of platforms">
          <span class="name">{{ p.name }}</span>
          <div class="actions">
            <button class="inest-action-btn" (click)="renamePlatform(p)" [title]="'SHARED.TOOLTIP_RENAME' | translate">📝</button>
            <button class="inest-action-btn is-danger" (click)="deletePlatform(p)" [title]="'SHARED.TOOLTIP_DELETE' | translate">❌</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
