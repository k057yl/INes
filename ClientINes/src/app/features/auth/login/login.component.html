<div class="login-container">
  <div class="auth-card">
    <header class="auth-header">
      <div class="logo-circle"><i class="fa fa-sign-in-alt"></i></div>
      <h2>{{ 'LOGIN.TITLE' | translate }}</h2>
      <p>{{ 'LOGIN.SUBTITLE' | translate }}</p>
    </header>

    <form (ngSubmit)="login()" #loginForm="ngForm">
      <div class="form-group">
        <label>{{ 'LOGIN.USERNAME' | translate }}</label>
        <div class="inest-field-group">
          <i class="fa fa-user inest-field-icon-left"></i>
          <input [(ngModel)]="email" 
                name="email" 
                required 
                class="inest-field-input"
                autocomplete="username"
                [placeholder]="'LOGIN.FIELD_USERNAME' | translate">
        </div>
      </div>

      <div class="form-group">
        <label>{{ 'LOGIN.PASSWORD' | translate }}</label>
        <div class="inest-field-group">
          <i class="fa fa-lock inest-field-icon-left"></i>
          <input [type]="showPassword ? 'text' : 'password'" 
                [(ngModel)]="password" 
                name="password" 
                required 
                class="inest-field-input"
                autocomplete="current-password"
                [placeholder]="'LOGIN.FIELD_PASSWORD' | translate">
          
          <button type="button" 
                  class="inest-action-btn inest-field-action" 
                  (click)="togglePassword()">
            <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <div class="status-box error" *ngIf="error">
        <i class="fa fa-exclamation-triangle"></i> 
        {{ error | translate }}
      </div>

      <button type="submit" class="auth-submit-btn" [disabled]="!loginForm.valid">
        {{ 'LOGIN.BUTTON_START' | translate }}
      </button>
    </form>

    <div class="divider">
      <span>{{ 'LOGIN.OR' | translate }}</span>
    </div>

    <button type="button" class="google-toggle-btn" (click)="toggleGoogle()">
      <i class="fab fa-google"></i>
      {{ (showGoogle ? 'LOGIN.BUTTON_HIDE_GOOGLE' : 'LOGIN.BUTTON_SHOW_GOOGLE') | translate }}
    </button>

    <div id="googleBtn" *ngIf="showGoogle" class="google-btn-container"></div>

    <footer class="auth-footer">
      <span>{{ 'LOGIN.NO_ACC_YET' | translate }}</span>
      <a routerLink="/register">{{ 'LOGIN.GO_TO_REGISTER' | translate }}</a>
    </footer>
  </div>
</div>
