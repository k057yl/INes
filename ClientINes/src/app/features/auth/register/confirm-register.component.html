<div class="inest-form-page">
  <div class="inest-form-card">
    <header class="inest-form-header">
      <div class="logo-circle"><i class="fa fa-envelope-open-text"></i></div>
      <h2>{{ 'AUTH.CONFIRM.TITLE' | translate }}</h2>
      <p>{{ 'AUTH.CONFIRM.SUBTITLE' | translate }}</p>
      <small class="target-email" style="color: var(--accent-color); font-weight: 600;" *ngIf="email">
        {{ email }}
      </small>
    </header>

    <div class="otp-wrapper">
      <div class="otp-container">
        <input 
          *ngFor="let digit of codeArray; let i = index"
          type="text"
          inputmode="numeric"
          maxlength="1"
          class="otp-input"
          [(ngModel)]="codeArray[i]"
          (input)="onInput($event, i)"
          (keydown)="onKeyDown($event, i)"
          (paste)="onPaste($event)"
          [class.filled]="codeArray[i]"
        >
      </div>
    </div>

    <div class="inest-status-box error" *ngIf="error">
      <i class="fa fa-exclamation-circle"></i> {{ error | translate }}
    </div>

    <div class="inest-status-box success" *ngIf="message">
      <i class="fa fa-check-double"></i> {{ message | translate }}
    </div>

    <button class="inest-btn-primary" (click)="confirm()" [disabled]="codeArray.join('').length < 6">
      {{ 'AUTH.CONFIRM.SUBMIT_BTN' | translate }}
      <i class="fa fa-check" style="margin-left: 8px;"></i>
    </button>

    <footer class="inest-form-footer">
      <span>{{ 'AUTH.CONFIRM.RESEND_TEXT' | translate }}</span>
      <a href="javascript:void(0)" (click)="resendCode()">{{ 'AUTH.CONFIRM.RESEND_LINK' | translate }}</a>
    </footer>
  </div>
</div>
