<div class="main-page-container">
  
  <app-location-ribbon
    [locations]="facade.locations"
    [currentPage]="currentPageRibbon"
    [activeBoardIds]="activeBoardIds"
    (pageChange)="onRibbonPageChange($event)"
    (reorder)="onRibbonReorder($event)"
    (jumpTo)="jumpToLocation($event)">
  </app-location-ribbon>

  <div class="board-grid-3">
    <div class="loader-overlay" *ngIf="facade.isLoading">
      <i class="fa fa-spinner fa-spin"></i> {{'COMMON.LOADING' | translate }}
    </div>
    
    <app-location-card 
      *ngFor="let loc of pagedBoardLocations; trackBy: trackById"
      [location]="loc"
      [flatLocations]="facade.flatLocations"
      [connectedLists]="facade.connectedLists"
      [isChildOf]="isChildOf"
      (itemDropped)="onItemDropped($event)"
      (lendItem)="onLendRequest($event)"
      (sellItem)="onSellRequest($event)" 
      (move)="onLocationMove($event)"
      (moveItemManual)="onItemMoveManual($event)"
      (rename)="onRename($event)"
      (deleteItem)="onDeleteItem($event)"
      (delete)="onDeleteLocation($event)">
    </app-location-card>

    <div class="zero-state-container" *ngIf="!facade.isLoading && facade.locations.length === 0">
      <div class="zero-state-content">
        <i class="fa fa-box-open zero-icon"></i>
        <h2>{{ 'MAIN_PAGE.LOCATION_EMPTY_MSG' | translate }}</h2>
        <button class="inest-btn-primary" (click)="modal.openLocationForm()">
          <i class="fa fa-plus-circle"></i>
          {{ 'MAIN_PAGE.CREATE_FIRST_BTN' | translate }}
        </button>
      </div>
    </div>
  </div>

  <div class="board-pager-row" *ngIf="totalBoardPages > 1">
    <div class="board-pager-nav">
      <button (click)="changeBoardPage(-1)" [disabled]="currentPageBoard === 0"><i class="fa fa-angle-left"></i></button>
      <span class="page-info">{{'COMMON.PAGE' | translate }} {{ currentPageBoard + 1 }}/{{ totalBoardPages }}</span>
      <button (click)="changeBoardPage(1)" [disabled]="currentPageBoard === totalBoardPages - 1"><i class="fa fa-angle-right"></i></button>
    </div>
  </div>
</div>
