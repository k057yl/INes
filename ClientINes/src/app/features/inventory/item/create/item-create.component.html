<div class="inest-form-page">
  <div class="inest-form-card item-card-wide">
    <header class="inest-form-header">
      <div class="logo-circle"><i class="fa fa-plus"></i></div>
      <h2>{{ 'CREATE_ITEM.TITLE' | translate }}</h2>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <div class="inest-form-group">
        <label>{{ 'CREATE_ITEM.NAME' | translate }} *</label>
        <div class="inest-input-wrapper">
          <i class="fa fa-tag inest-field-icon-left"></i>
          <input formControlName="name" [placeholder]="'CREATE_ITEM.FIELD_NAME' | translate">
        </div>
        <small class="status-text error" *ngIf="form.get('name')?.touched && form.get('name')?.hasError('required')">
          {{ 'ERRORS.REQUIRED_FIELD' | translate }}
        </small>
      </div>

      <div class="inest-form-group">
        <label>{{ 'CREATE_ITEM.DESCRIPTION' | translate }}</label>
        <div class="inest-input-wrapper">
          <i class="fa fa-align-left inest-field-icon-left"></i>
          <textarea formControlName="description" [placeholder]="'CREATE_ITEM.FIELD_DESCRIPTION' | translate" rows="3"></textarea>
        </div>
      </div>

      <div class="inest-form-group">
        <label class="label-with-action">
          <span>{{ 'CREATE_ITEM.CATEGORY' | translate }} *</span>
          <button type="button" class="inline-add-btn" (click)="showCategoryModal = true">
            <i class="fa fa-plus"></i> {{ 'CREATE_ITEM.CREATE_CATEGORY' | translate }}
          </button>
        </label>
        <div class="inest-input-wrapper">
          <i class="fa fa-folder inest-field-icon-left"></i>
          <select formControlName="categoryId">
            <option value="" disabled>{{ 'CREATE_ITEM.FIELD_CATEGORY' | translate }}</option>
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>
      </div>

      <div class="form-row-2">
        <div class="inest-form-group">
          <label>{{ 'CREATE_ITEM.STATUS' | translate }}</label>
          <div class="inest-input-wrapper">
            <i class="fa fa-info-circle inest-field-icon-left"></i>
            <select formControlName="status">
              <option *ngFor="let s of statuses" [value]="s.value">{{ s.label | translate }}</option>
            </select>
          </div>
        </div>

        <div class="inest-form-group">
          <label>{{ 'CREATE_ITEM.LOCATION' | translate }} *</label>
          <div class="inest-input-wrapper">
            <i class="fa fa-map-marker-alt inest-field-icon-left"></i>
            <select formControlName="storageLocationId">
              <option value="" disabled>{{ 'CREATE_ITEM.SELECT_LOCATION' | translate }}</option>
              <option *ngFor="let loc of locations" [value]="loc.id">{{ loc.name }}</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-row-2">
        <div class="inest-form-group">
          <label>{{ 'CREATE_ITEM.PURCHASE_DATE' | translate }}</label>
          <div class="inest-input-wrapper">
            <i class="fa fa-calendar-alt inest-field-icon-left"></i>
            <input type="date" formControlName="purchaseDate" [max]="todayMax">
          </div>
          <small class="status-text error" *ngIf="form.get('purchaseDate')?.hasError('futureDate')">
            {{ 'ERRORS.FUTURE_DATE' | translate }}
          </small>
        </div>

        <div class="inest-form-group">
          <label>{{ 'CREATE_ITEM.PRICE' | translate }} ($)</label>
          <div class="inest-input-wrapper">
            <i class="fa fa-wallet inest-field-icon-left"></i>
            <input formControlName="purchasePrice" type="number" placeholder="0.00">
          </div>
          <small class="status-text error" *ngIf="form.get('purchasePrice')?.hasError('min')">
            {{ 'ERRORS.NEGATIVE_NUMBER' | translate }}
          </small>
        </div>
      </div>

      <div class="photo-section">
        <div class="photo-header">
          <label class="photo-flag">
            <input type="checkbox" formControlName="addPhoto">
            <span>{{ 'CREATE_ITEM.ADD_PHOTO' | translate }}</span>
          </label>
        </div>

        <div *ngIf="form.get('addPhoto')?.value" class="upload-container">
          <div class="file-upload-zone" *ngIf="selectedPhotos.length < MAX_PHOTOS">
            <i class="fa fa-cloud-upload-alt"></i>
            <input type="file" accept="image/*" multiple (change)="onFileSelected($event)">
            <p>{{ 'CREATE_ITEM.CLICK_TO_UPLOAD' | translate }}</p>
          </div>

          <div class="photo-preview-grid">
            <div class="preview-item" *ngFor="let p of selectedPhotos; let i = index">
              <img [src]="p.preview">
              <button type="button" class="remove-photo" (click)="removePhoto(i)">×</button>
            </div>
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 15px; margin-top: 2rem;">
        <button type="button" class="inest-btn-cancel" (click)="cancel()">
          <i class="fa fa-times"></i> {{ 'CREATE_ITEM.BUTTON_CANCEL' | translate }}
        </button>
        <button type="submit" class="inest-btn-primary" style="flex: 2; margin-top: 0;" [disabled]="form.invalid">
          <i class="fa fa-save"></i> {{ 'CREATE_ITEM.BUTTON_START' | translate }}
        </button>
      </div>
    </form>
  </div>
</div>

<app-inest-modal 
  *ngIf="showCategoryModal"
  mode="input"
  [title]="'CREATE_ITEM.CREATE_CATEGORY'"
  [confirmText]="'MAIN.ADD'"
  (confirmed)="onCategoryConfirmed($event)"
  (cancelled)="showCategoryModal = false">
</app-inest-modal>
