<div class="edit-container" *ngIf="item">
  
  <div class="edit-card">
    <header class="card-header">
      <h2><i class="fa fa-pen"></i> {{ 'EDIT_ITEM.TITLE' | translate }}</h2>
      <div class="status-badge" [class]="item.status | statusName">
        {{ 'STATUS.' + (item.status | statusName) | translate }}
      </div>
    </header>

    <div class="lending-banner" *ngIf="(item.status === 1 || item.status === 7) && item.lending">
      <div class="lending-info">
        <i class="fa fa-handshake"></i>
        <span>{{ 'EDIT_ITEM.LENT_INFO' | translate: { name: item.lending.personName } }}</span>
      </div>
      <button class="return-btn" (click)="returnItem()">
        <i class="fa fa-undo"></i> {{ 'EDIT_ITEM.RETURN_NOW' | translate }}
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="vertical-form">
      
      <div class="form-group">
        <label>{{ 'EDIT_ITEM.NAME' | translate }} *</label>
        <input type="text" formControlName="name">
      </div>

      <div class="form-group">
        <label>{{ 'EDIT_ITEM.DESCRIPTION' | translate }}</label>
        <textarea formControlName="description" rows="3"></textarea>
      </div>

      <div class="form-row-single">
        <div class="form-group">
          <label>{{ 'EDIT_ITEM.CATEGORY' | translate }} *</label>
          <select formControlName="categoryId">
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>{{ 'EDIT_ITEM.LOCATION' | translate }} *</label>
        <select formControlName="storageLocationId">
          <option *ngFor="let loc of locations" [value]="loc.id">{{ loc.name }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>{{ 'EDIT_ITEM.PURCHASE_PRICE' | translate }} ($)</label>
        <input type="number" formControlName="purchasePrice">
      </div>

      <div class="form-group">
        <label>{{ 'EDIT_ITEM.ESTIMATED_VALUE' | translate }} ($)</label>
        <input type="number" formControlName="estimatedValue">
      </div>

      <div class="form-group">
        <label>{{ 'EDIT_ITEM.PURCHASE_DATE' | translate }}</label>
        <input type="date" formControlName="purchaseDate">
      </div>

      <div class="lending-extra-fields" *ngIf="isLendingStatus">
        <div class="divider-text" style="margin: 1.5rem 0 1rem; border-bottom: 1px solid #eee; padding-bottom: 5px;">
          <b style="font-size: 0.9rem; color: #666; text-transform: uppercase;">
            {{ (form.get('status')?.value == 7 ? 'CREATE_ITEM.BORROWED_INFO' : 'CREATE_ITEM.LENT_INFO') | translate }}
          </b>
        </div>

        <div class="form-group">
          <label>{{ 'CREATE_ITEM.PERSON_NAME' | translate }} *</label>
          <input type="text" formControlName="personName">
        </div>

        <div class="form-group">
          <label>{{ 'CREATE_ITEM.RETURN_DATE' | translate }} *</label>
          <input type="date" formControlName="expectedReturnDate">
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
          <input type="checkbox" formControlName="sendNotification" id="sendNotifEdit">
          <label for="sendNotifEdit" style="margin: 0; cursor: pointer;">
            {{ 'CREATE_ITEM.SEND_EMAIL_TO_ME' | translate }}
          </label>
        </div>
      </div>

      <div class="photo-section">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="addPhoto"> {{ 'EDIT_ITEM.ADD_NEW_PHOTOS' | translate }}
        </label>

        <div class="photo-upload-box" *ngIf="form.get('addPhoto')?.value">
          <input type="file" multiple (change)="onFileSelected($event)" accept="image/*" #fileInput hidden>
          <button type="button" class="upload-trigger" (click)="fileInput.click()">
            <i class="fa fa-camera"></i> {{ 'EDIT_ITEM.SELECT_PHOTOS' | translate }}
          </button>

          <div class="preview-grid" *ngIf="selectedPhotos.length">
            <div class="preview-item" *ngFor="let p of selectedPhotos; let i = index">
              <img [src]="p.preview">
              <button type="button" (click)="removePhoto(i)" class="remove-p">×</button>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" [routerLink]="['/item', itemId]">
          {{ 'COMMON.CANCEL' | translate }}
        </button>
        <button type="submit" class="btn-save" [disabled]="form.invalid || (item.status !== 0 && !form.get('addPhoto')?.value)">
          {{ 'COMMON.SAVE' | translate }}
        </button>
      </div>
    </form>
  </div>
</div>
