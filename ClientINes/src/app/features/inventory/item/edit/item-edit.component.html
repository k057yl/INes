<div class="inest-form-page" *ngIf="item">
  <div class="inest-form-card">
    <header class="inest-form-header">
      <div class="logo-circle"><i class="fa fa-pen"></i></div>
      <div class="header-text">
        <h2>{{ 'COMMON.EDIT' | translate }}</h2>
        <div class="status-badge-inline" [class]="item.status | statusName">
          {{ 'STATUS.' + (item.status | statusName) | translate }}
        </div>
      </div>
    </header>

    <div class="inest-lending-banner" *ngIf="(item.status === 1 || item.status === 7) && item.lending">
      <div class="banner-content">
        <i class="fa fa-handshake"></i>
        <span>{{ 'EDIT_ITEM_PAGE.LENT_INFO' | translate: { name: item.lending.personName } }}
          <strong>{{ item.lending.expectedReturnDate | date:'dd.MM.yyyy' }}</strong>
        </span>
      </div>
      <button type="button" class="inline-action-btn" (click)="returnItem()">
        <i class="fa fa-undo"></i> {{ 'EDIT_ITEM_PAGE.RETURN_NOW' | translate }}
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <div class="inest-form-group">
        <label>{{ 'EDIT_ITEM_PAGE.NAME' | translate }} *</label>
        <div class="inest-input-wrapper" [class.is-invalid]="isControlInvalid('name')">
          <i class="fa fa-tag inest-field-icon-left"></i>
          <input type="text" formControlName="name">
        </div>
        <div class="inest-error-container">
          <small class="inest-error-text" *ngIf="isControlInvalid('name')">{{ 'ERRORS.REQUIRED_FIELD' | translate }}</small>
        </div>
      </div>

      <div class="inest-form-group">
        <label>{{ 'EDIT_ITEM_PAGE.DESCRIPTION' | translate }}</label>
        <div class="inest-input-wrapper">
          <i class="fa fa-align-left inest-field-icon-left"></i>
          <textarea formControlName="description" rows="3"></textarea>
        </div>
      </div>

      <div class="inest-form-group">
        <label>{{ 'EDIT_ITEM_PAGE.CATEGORY' | translate }} *</label>
        <div class="inest-input-wrapper" [class.is-invalid]="isControlInvalid('categoryId')">
          <i class="fa fa-folder inest-field-icon-left"></i>
          <select formControlName="categoryId">
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>
      </div>

      <div class="inest-form-group">
        <label>{{ 'EDIT_ITEM_PAGE.LOCATION' | translate }} *</label>
        <div class="inest-input-wrapper" [class.is-invalid]="isControlInvalid('storageLocationId')">
          <i class="fa fa-map-marker-alt inest-field-icon-left"></i>
          <select formControlName="storageLocationId">
            <option *ngFor="let loc of locations" [value]="loc.id">{{ loc.name }}</option>
          </select>
        </div>
      </div>

      <div class="inest-form-group">
        <label>{{ 'EDIT_ITEM_PAGE.PRICE' | translate }} ($)</label>
        <div class="inest-input-wrapper">
          <i class="fa fa-wallet inest-field-icon-left"></i>
          <input type="number" formControlName="purchasePrice">
        </div>
      </div>

      <div class="inest-form-group">
        <label>{{ 'EDIT_ITEM_PAGE.ESTIMATED' | translate }} ($)</label>
        <div class="inest-input-wrapper">
          <i class="fa fa-chart-line inest-field-icon-left"></i>
          <input type="number" formControlName="estimatedValue">
        </div>
      </div>

      <div class="inest-form-group">
        <label>{{ 'EDIT_ITEM_PAGE.DATE' | translate }}</label>
        <div class="inest-input-wrapper">
          <i class="fa fa-calendar-alt inest-field-icon-left"></i>
          <input type="date" formControlName="purchaseDate">
        </div>
      </div>

      <div class="photo-edit-section">
        <label class="inest-checkbox-label">
          <input type="checkbox" formControlName="addPhoto"> 
          <span>{{ 'EDIT_ITEM_PAGE.ADD_NEW_PHOTO' | translate }}</span>
        </label>

        <div class="photo-upload-box" *ngIf="form.get('addPhoto')?.value">
          <input type="file" multiple (change)="onFileSelected($event)" accept="image/*" #fileInput hidden>
          <button type="button" class="inest-btn-outline" (click)="fileInput.click()" style="margin: 10px 0;">
            <i class="fa fa-camera"></i> {{ 'COMMON.SELECT' | translate }}
          </button>

          <div class="preview-grid" *ngIf="selectedPhotos.length">
            <div class="preview-item" *ngFor="let p of selectedPhotos; let i = index">
              <img [src]="p.preview">
              <button type="button" (click)="removePhoto(i)" class="remove-p">×</button>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions-row">
        <button type="button" class="inest-btn-cancel" [routerLink]="['/item', itemId]">
          <i class="fa fa-times"></i> {{ 'COMMON.CANCEL' | translate }}
        </button>
        <button type="submit" class="inest-btn-primary" [disabled]="form.invalid || (item.status !== 0 && !form.get('addPhoto')?.value)">
          <i class="fa fa-save"></i> {{ 'COMMON.SAVE' | translate }}
        </button>
      </div>
    </form>
  </div>
</div>
