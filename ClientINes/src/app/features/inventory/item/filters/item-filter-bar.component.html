<div class="smart-filter-container">
  <div class="top-action-bar">
    <div class="search-box" [formGroup]="filterForm">
      <i class="fa fa-search search-icon"></i>
      <input type="text" formControlName="searchQuery" [placeholder]="'FILTERS.SEARCH_PHL' | translate">
      <button class="clear-btn" *ngIf="filterForm.get('searchQuery')?.value" (click)="filterForm.patchValue({searchQuery: ''})">
        <i class="fa fa-times"></i>
      </button>
    </div>

    <div class="action-buttons">
      <button class="icon-btn bulk-btn" [class.active]="isBulkMode" (click)="toggleBulkMode()" title="Режим выделения">
        <i class="fa fa-check-square"></i>
      </button>

      <div class="dropdown-wrapper">
        <button class="icon-btn sort-btn" [class.active]="showSort" (click)="toggleSort()">
          <i class="fa fa-sort-amount-down"></i>
        </button>
        <div class="dropdown-panel sort-panel" *ngIf="showSort">
          <button (click)="setSort(0)" [class.active]="filterForm.get('sortBy')?.value === 0">{{ 'FILTERS.SORT.NEWEST' | translate }}</button>
          <button (click)="setSort(2)" [class.active]="filterForm.get('sortBy')?.value === 2">{{ 'FILTERS.SORT.NAME_ASC' | translate }}</button>
          <button (click)="setSort(4)" [class.active]="filterForm.get('sortBy')?.value === 4">{{ 'FILTERS.SORT.PRICE_ASC' | translate }}</button>
          <button (click)="setSort(5)" [class.active]="filterForm.get('sortBy')?.value === 5">{{ 'FILTERS.SORT.PRICE_DESC' | translate }}</button>
        </div>
      </div>

      <div class="dropdown-wrapper">
        <button class="icon-btn filter-btn" [class.active]="showFilters" (click)="toggleFilters()">
          <i class="fa fa-sliders-h"></i>
          <span class="badge" *ngIf="filterForm.get('categoryId')?.value || filterForm.get('minPrice')?.value"></span>
        </button>
        
        <div class="dropdown-panel filters-panel" *ngIf="showFilters" [formGroup]="filterForm">
          <div class="panel-header">
            <span>{{ 'FILTERS.TITLE' | translate }}</span>
            <button class="text-reset" (click)="reset()">{{ 'FILTERS.RESET_SHORT' | translate }}</button>
          </div>
          
          <div class="inest-form-group">
            <label>{{ 'FILTERS.CATEGORY' | translate }}</label>
            <div class="inest-input-wrapper">
              <select formControlName="categoryId">
                <option [ngValue]="null">{{ 'FILTERS.CATEGORY_PHL' | translate }}</option>
                <option *ngFor="let cat of categories$ | async" [value]="cat.id">{{ cat.name }}</option>
              </select>
            </div>
          </div>

          <div class="inest-form-group">
            <label>{{ 'FILTERS.PRICE' | translate }}</label>
            <div class="price-range">
              <div class="inest-input-wrapper"><input type="number" formControlName="minPrice" placeholder="От"></div>
              <div class="inest-input-wrapper"><input type="number" formControlName="maxPrice" placeholder="До"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-chips-scroll">
    <button *ngFor="let s of quickStatuses" 
            class="chip" 
            [class.active]="filterForm.get('status')?.value === s.value"
            (click)="setStatus(s.value)">
      {{ s.label | translate }}
    </button>
  </div>
</div>
