<div class="filter-wrapper">
  <button class="inest-filter-btn" [class.active]="showPanel" (click)="toggle()">
    <i class="fa fa-sliders-h"></i>
  </button>

  <div class="filter-panel" *ngIf="showPanel">
    <div class="panel-header"> <div class="header-left">
        <i class="fa fa-filter"></i>
        <span>{{ 'FILTERS.TITLE' | translate }}</span>
      </div>
      
      <div class="header-actions">
        <button type="button" class="text-reset-btn" 
                (click)="reset()" 
                [title]="'FILTERS.RESET' | translate">
          <i class="fa fa-sync-alt"></i>
          <span>{{ 'FILTERS.RESET_SHORT' | translate }}</span>
        </button>

        <button type="button" class="panel-close-btn" 
                (click)="toggle()" 
                [title]="'COMMON.CLOSE' | translate">
          <i class="fa fa-times"></i>
        </button>
      </div>
    </div>

    <form [formGroup]="filterForm" class="filter-grid">
      <div class="search-row">
        <div class="input-icon-wrapper">
          <input type="text" formControlName="searchQuery" [placeholder]="'FILTERS.SEARCH_PHL' | translate">
          <i class="fa fa-search"></i>
        </div>
      </div>

      <div class="main-filters">
        <div class="field-group">
          <label>{{ 'FILTERS.CATEGORY' | translate }}</label>
          <select formControlName="categoryId">
            <option [ngValue]="null">{{ 'FILTERS.CATEGORY_PHL' | translate }}</option>
            <option *ngFor="let cat of categories$ | async" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>

        <div class="field-group">
          <label>{{ 'FILTERS.STATUS' | translate }}</label>
          <select formControlName="status">
            <option [ngValue]="null">{{ 'FILTERS.SHOW_ALL' | translate }}</option>
            <option [ngValue]="0">{{ 'STATUS.ACTIVE' | translate }}</option>
            <option [ngValue]="6">{{ 'STATUS.LISTED' | translate }}</option>
            <option [ngValue]="1">{{ 'STATUS.LENT' | translate }}</option>
            <option [ngValue]="4">{{ 'STATUS.SOLD' | translate }}</option>
          </select>
        </div>

        <div class="field-group">
          <label>{{ 'FILTERS.SORT_BY' | translate }}</label>
          <select formControlName="sortBy">
            <option [ngValue]="0">{{ 'FILTERS.SORT.NEWEST' | translate }}</option>
            <option [ngValue]="1">{{ 'FILTERS.SORT.OLDEST' | translate }}</option>
            <option [ngValue]="2">{{ 'FILTERS.SORT.NAME_ASC' | translate }}</option>
            <option [ngValue]="3">{{ 'FILTERS.SORT.NAME_DESC' | translate }}</option>
            <option [ngValue]="4">{{ 'FILTERS.SORT.PRICE_ASC' | translate }}</option>
            <option [ngValue]="5">{{ 'FILTERS.SORT.PRICE_DESC' | translate }}</option>
          </select>
        </div>

        <div class="field-group">
          <label>{{ 'FILTERS.PRICE' | translate }}</label>
          <div class="price-range">
            <input type="number" formControlName="minPrice" [placeholder]="'FILTERS.PRICE_FROM' | translate">
            <span class="sep">-</span>
            <input type="number" formControlName="maxPrice" [placeholder]="'FILTERS.PRICE_TO' | translate">
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
