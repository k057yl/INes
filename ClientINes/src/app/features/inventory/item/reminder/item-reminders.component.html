<div class="reminders-widget">
  <div class="widget-header">
    <h3><i class="fa fa-bell"></i> {{ 'REMINDS_PAGE.OPEN_MENU' | translate }}</h3>
    <button class="add-btn" (click)="toggleAdd()" [title]="'COMMON.ADD' | translate">
      <i class="fa" [ngClass]="isAdding ? 'fa-times' : 'fa-plus'"></i>
    </button>
  </div>

  <div class="add-form-container" *ngIf="isAdding">
    <form [formGroup]="reminderForm" (ngSubmit)="onSubmit()">
      <div class="form-fields-stack">
        
        <div class="field-group">
          <label>{{ 'REMINDS_PAGE.NAME_LABEL' | translate }}</label>
          <input type="text" formControlName="title" [placeholder]="'REMINDS_PAGE.NAME_PHL' | translate" class="inest-input-styled">
        </div>

        <div class="field-group">
          <label>{{ 'REMINDS_PAGE.TYPE_LABEL' | translate }}</label>
          <select formControlName="type" class="inest-input-styled">
            <option *ngFor="let type of availableTypes" [value]="type.value">
              {{ type.label | translate }}
            </option>
          </select>
        </div>

        <div class="field-group">
          <label>{{ 'REMINDS_PAGE.RECURRENCE' | translate }}</label>
          <select formControlName="recurrence" class="inest-input-styled">
            <option *ngFor="let rec of availableRecurrences" [value]="rec.value">
              {{ rec.label | translate }}
            </option>
          </select>
        </div>

        <div class="field-group">
          <label>{{ 'REMINDS_PAGE.DATE_LABEL' | translate }}</label>
          <input type="date" formControlName="triggerAt" class="inest-input-styled">
        </div>

        <button type="submit" class="save-btn" [disabled]="reminderForm.invalid">
          <i class="fa fa-save"></i> {{ 'COMMON.SAVE' | translate }}
        </button>
      </div>
    </form>
  </div>

  <div class="reminders-list">
    <div *ngIf="reminders.length === 0" class="empty-state">
      {{ 'REMINDS_PAGE.EMPTY_LABEL' | translate }}
    </div>

    <div class="reminder-item" *ngFor="let r of reminders" [class.completed]="r.isCompleted">
      <div class="r-info">
        <div class="r-title-row">
            <strong>{{ r.title }}</strong>
        </div>
        <div class="r-meta-row">
          <span [style.color]="getReminderInfo(r.type).color">
            <i class="fa" [ngClass]="getReminderInfo(r.type).icon"></i>
            {{ getReminderInfo(r.type).label | translate }}
          </span>
          <span class="r-date">
            <i class="fa fa-calendar-alt"></i> {{ r.triggerAt | date:'dd.MM.yyyy' }}
          </span>
        </div>
      </div>
      
      <div class="r-actions" *ngIf="!r.isCompleted">
        <button class="icon-btn success" (click)="requestComplete(r.id)" [title]="'COMMON.SAVE' | translate">
          <i class="fa fa-check"></i>
        </button>
        <button class="icon-btn danger" (click)="requestDelete(r.id)" [title]="'COMMON.DELETE' | translate">
          <i class="fa fa-trash"></i>
        </button>
      </div>
    </div>
  </div>
</div>
