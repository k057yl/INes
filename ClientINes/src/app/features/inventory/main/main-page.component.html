<div class="main-page-container">
  
  <app-location-ribbon
    [locations]="locations"
    [currentPage]="currentPageRibbon"
    [activeBoardIds]="activeBoardIds"
    (pageChange)="currentPageRibbon = $event"
    (reorder)="onRibbonReorder($event)"
    (jumpTo)="jumpToLocation($event)">
  </app-location-ribbon>

  <div class="board-grid-3">
    <div class="loader-overlay" *ngIf="isLoading">{{'MAIN.LOADING' | translate }}</div>
    
    <app-location-card 
      *ngFor="let loc of pagedBoardLocations; trackBy: trackById"
      [location]="loc"
      [flatLocations]="flatLocations"
      [connectedLists]="connectedLists"
      [isChildOf]="isChildOf"
      (itemDropped)="onItemDropped($event)"
      (lendItem)="onLendRequest($event)"
      (sellItem)="onSellRequest($event)" 
      (move)="onLocationMove($event)"
      (moveItemManual)="onItemMoveManual($event)"
      (rename)="onRename($event)"
      (deleteItem)="onDeleteItem($event)"
      (delete)="onDeleteLocation($event)">
    </app-location-card>

    <div class="zero-state-container" *ngIf="!isLoading && locations.length === 0">
      <div class="zero-state-content">
        <i class="fa fa-box-open zero-icon"></i>
        <h2>{{ 'MAIN_PAGE.LOCATION_EMPTY_MSG' | translate }}</h2>
        
        <button class="inest-btn-primary" 
                [routerLink]="['/location-create']" 
                style="max-width: 300px; margin: 20px auto;">
          <i class="fa fa-plus-circle"></i>
          {{ 'MAIN_PAGE.CREATE_FIRST_BTN' | translate }}
        </button>
      </div>
  </div>
</div>

<div class="board-pager-row" *ngIf="totalBoardPages > 1">
  <div class="board-pager-nav">
    <button (click)="currentPageBoard = currentPageBoard - 1" [disabled]="currentPageBoard === 0">❮</button>
    <span class="page-info">{{'MAIN.PAGE' | translate }}{{ currentPageBoard + 1 }} / {{ totalBoardPages }}</span>
    <button (click)="currentPageBoard = currentPageBoard + 1" [disabled]="currentPageBoard === totalBoardPages - 1">❯</button>
  </div>
</div>

<app-inest-modal
  *ngIf="modalConfig"
  [mode]="modalConfig.mode"
  [title]="modalConfig.title"
  [message]="modalConfig.message"
  [name]="modalConfig.name || ''"
  [confirmText]="modalConfig.confirmText" 
  [cancelText]="modalConfig.cancelText"
  (confirmed)="handleModalConfirm($event)"
  (cancelled)="closeModals()">
</app-inest-modal>

<app-sell-modal 
  *ngIf="activeModal === 'sell' && selectedItem" 
  [item]="selectedItem"
  (close)="closeModals()"
  (confirm)="onSellConfirmed($event)">
</app-sell-modal>

<app-lend-item-modal 
  *ngIf="activeModal === 'lend' && selectedItem" 
  [item]="selectedItem"
  [isOpen]="true"
  (close)="closeModals()"
  (confirm)="onLendConfirmed($event)">
</app-lend-item-modal>
