<header class="header">
  <div class="header-main">
    <div class="brand-section">
      <button class="menu-toggle" (click)="toggleMenu()" [class.open]="isMenuOpen()">
        <span></span><span></span><span></span>
      </button>
      <h2 class="logo" routerLink="/main">INest</h2>
    </div>

    <nav class="nav-links" [class.mobile-open]="isMenuOpen()">
      <a routerLink="/main" routerLinkActive="active" (click)="closeMenu()">
        <i class="fa fa-th-large"></i> {{ 'HEADER.HOME' | translate }}
      </a>

      <ng-container *ngIf="user$ | async">
        <a routerLink="/sales" routerLinkActive="active" (click)="closeMenu()">
          <i class="fa fa-chart-line"></i> {{ 'HEADER.SALES' | translate }}
        </a>
        <a routerLink="/settings" routerLinkActive="active" (click)="closeMenu()">
          <i class="fa fa-cog"></i> {{ 'HEADER.SETTINGS' | translate }}
        </a>
        <a routerLink="/admin" class="admin-link" routerLinkActive="active">
          <i class="fa fa-tools"></i> {{ 'HEADER.MANAGEMENT' | translate }}
        </a>
      </ng-container>
      
      <hr class="mobile-divider">

      <ng-container *ngIf="!(user$ | async); else logoutBtn">
        <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()" class="auth-link">
          <i class="fa fa-sign-in-alt"></i> {{ 'HEADER.LOGIN' | translate }}
        </a>
        <a routerLink="/register" routerLinkActive="active" (click)="closeMenu()" class="auth-link">
          <i class="fa fa-user-plus"></i> {{ 'HEADER.REGISTER' | translate }}
        </a>
      </ng-container>

      <ng-template #logoutBtn>
        <a (click)="onLogout()" class="auth-link logout-trigger" style="cursor: pointer;">
          <i class="fa fa-sign-out-alt"></i> {{ 'HEADER.LOGOUT' | translate }}
        </a>
      </ng-template>
    </nav>

    <div class="actions">
      <div class="user-box" *ngIf="user$ | async as user" [title]="user.email">
        <strong>{{ user.email }}</strong>
      </div>
      <button class="theme-toggle" (click)="toggleTheme()">
        {{ themeService.isDarkTheme() ? '🌙' : '☀️' }}
      </button>

      <div class="lang-dropdown" [class.open]="isLangMenuOpen()">
        <button class="lang-trigger" (click)="toggleLangMenu($event)">
          <i class="fa fa-globe"></i>
          <span class="active-lang">{{ currentLang | uppercase }}</span>
          <i class="fa fa-chevron-down" [class.rotate]="isLangMenuOpen()"></i>
        </button>

        <div class="lang-menu" *ngIf="isLangMenuOpen()" (click)="$event.stopPropagation()">
          <button
            *ngFor="let lang of languages"
            (click)="changeLang(lang.code)"
            [class.selected]="currentLang === lang.code">

            <span class="flag">{{ lang.flag }}</span>
            {{ lang.label }}

          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="overlay" *ngIf="isMenuOpen()" (click)="closeMenu()"></div>
