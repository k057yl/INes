<header class="header">
  <div class="header-main">
    
    <button class="menu-toggle" (click)="toggleMenu($event)" [class.active]="isMenuOpen()">
      <i class="fa" [class.fa-bars]="!isMenuOpen()" [class.fa-times]="isMenuOpen()"></i>
    </button>

    <div class="brand-section">
      <div class="logo" routerLink="/main">
        <div class="logo-icon"></div>
      </div>
    </div>

    <nav class="nav-links" [class.mobile-open]="isMenuOpen()">
      <a routerLink="/main" routerLinkActive="active" (click)="closeMenu()">
        <i class="fa fa-th-large"></i> {{ 'HEADER.HOME' | translate }}
      </a>

      <ng-container *ngIf="user$ | async">
        <a routerLink="/explorer" routerLinkActive="active" (click)="closeMenu()">
          <i class="fa fa-boxes"></i> {{ 'HEADER.ITEMS' | translate }}
        </a>
        <a routerLink="/sales" routerLinkActive="active" (click)="closeMenu()">
          <i class="fa fa-chart-line"></i> {{ 'HEADER.SALES' | translate }}
        </a>
        <a routerLink="/settings" routerLinkActive="active" (click)="closeMenu()">
          <i class="fa fa-cog"></i> {{ 'HEADER.SETTINGS' | translate }}
        </a>
      </ng-container>
      
      <hr class="mobile-divider">

      <ng-container *ngIf="!(user$ | async);">
        <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()" class="auth-link mobile-only">
          <i class="fa fa-sign-in-alt"></i> {{ 'HEADER.LOGIN' | translate }}
        </a>
        <a routerLink="/register" routerLinkActive="active" (click)="closeMenu()" class="auth-link mobile-only">
          <i class="fa fa-sign-in-alt"></i> {{ 'HEADER.REGISTERATION' | translate }}
        </a>
      </ng-container>
    </nav>

    <div class="actions">
      <div class="create-dropdown" *ngIf="user$ | async" [class.open]="isCreateMenuOpen()">
        <button class="create-trigger" (click)="toggleCreateMenu($event)" [title]="'COMMON.CREATE' | translate">
          <i class="fa fa-plus"></i>
          <span class="desktop-only">{{ 'COMMON.CREATE' | translate }}</span>
        </button>

        <div class="create-menu" *ngIf="isCreateMenuOpen()" (click)="$event.stopPropagation()">
          <button (click)="openCreateItem()">
            <i class="fa fa-box"></i>
            <span>{{ 'LOCATION_CARD.BTN.ITEM' | translate }}</span>
          </button>
          <button (click)="openCreateLocation()">
            <i class="fa fa-folder-plus"></i>
            <span>{{ 'LOCATION_CARD.BTN.LOCATION' | translate }}</span>
          </button>
        </div>
      </div>

      <div class="user-box" *ngIf="user$ | async as user" [title]="user.email">
        <i class="fa fa-user-circle"></i>
        <strong>{{ user.email }}</strong>
      </div>

      <button class="theme-toggle" (click)="toggleTheme()" [title]="'COMMON.CHANGE_THEME_TOOLTIP' | translate">
        {{ themeService.isDarkTheme() ? '🌙' : '☀️' }}
      </button>

      <div class="lang-dropdown" [class.open]="isLangMenuOpen()">
        <button class="lang-trigger" (click)="toggleLangMenu($event)" [title]="'COMMON.CHANGE_LANGUAGE_TOOLTIP' | translate">
          <i class="fa fa-globe"></i>
          <span class="active-lang">{{ currentLang | uppercase }}</span>
          <i class="fa fa-chevron-down" [class.rotate]="isLangMenuOpen()"></i>
        </button>

        <div class="lang-menu" *ngIf="isLangMenuOpen()" (click)="$event.stopPropagation()">
          <button *ngFor="let lang of languages" (click)="changeLang(lang.code)" [class.selected]="currentLang === lang.code">
            <span class="flag">{{ lang.flag }}</span>
            {{ lang.label }}
          </button>
        </div>
      </div>

      <button class="logout-icon-btn" *ngIf="user$ | async" (click)="onLogout()" [title]="'COMMON.EXIT' | translate">
        <i class="fa fa-sign-out-alt"></i>
      </button>
    </div>
  </div>
</header>

<div class="overlay" *ngIf="isMenuOpen()" (click)="closeMenu()"></div>
