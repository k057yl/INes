<div class="item-card" 
     cdkDrag 
     [cdkDragData]="item" 
     [cdkDragDisabled]="isMobile"
     [class.menu-open]="showMenu"
     [style.border-left-color]="getAccentColor()"> 

  <div class="item-thumb" [routerLink]="['/item', item.id]">
    <img *ngIf="item.photoUrl" [src]="getPhotoUrl(item.photoUrl)" alt="item">
    <div *ngIf="!item.photoUrl" class="no-image">
      <i class="fa fa-box-open"></i>
    </div>
  </div>

  <div class="item-content" [routerLink]="['/item', item.id]" style="cursor: pointer;">
    <div class="item-header">
      <span class="item-name" [title]="item.name">{{ item.name }}</span>
    </div>
    <div class="item-details">
      <span class="price-tag" *ngIf="featureService.isSalesModeEnabled() && item.estimatedValue">
        {{ item.estimatedValue | number:'1.0-0' }} <i class="fa fa-coins" style="font-size: 0.7rem; margin-left: 2px;"></i>
      </span>
      <span class="status-badges" style="margin-left: 10px;">
        <i *ngIf="item.status === 6" class="fa fa-shopping-cart" style="color: var(--g-blue);" [title]="'STATUS.LISTED' | translate"></i>
        
        <i *ngIf="item.status === 1" class="fa fa-share-square" style="color: var(--g-yellow);" [title]="'STATUS.LENT' | translate"></i>
        
        <i *ngIf="item.status === 7" class="fa fa-reply-all" style="color: var(--g-green); transform: scaleX(-1);" [title]="'STATUS.BORROWED' | translate"></i>
      </span>
    </div>
  </div>

  <div class="item-actions">
      <button *ngIf="!isMobile && featureService.isSalesModeEnabled() && item.status !== 4" 
              class="inest-action-btn" 
              (click)="sell.emit(item); $event.stopPropagation()"
              [title]="'ITEM_CARD.SELL' | translate">
        <i class="fa fa-dollar-sign"></i>
      </button>

      <button class="inest-action-btn" (click)="toggleMenu($event)" [class.active]="showMenu" [title]="'ITEM_CARD.INFO' | translate">
        <i class="fa fa-ellipsis-v"></i>
      </button>

    <div class="menu-dropdown item-menu" *ngIf="showMenu" (click)="$event.stopPropagation()">
      
      <div class="menu-section">
        <label><i class="fa fa-exchange-alt"></i> {{'ITEM_CARD.M_MOVE' | translate}}</label>
        <div class="select-wrapper">
          <select (change)="onMove($event)">
            <option value="" disabled selected>{{'ITEM_CARD.M_SELECT_LOCATION' | translate}}</option>
            <option *ngFor="let loc of availableLocations" [value]="loc.id">{{ loc.name }}</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <button [routerLink]="['/item', item.id]" (click)="showMenu = false">
        <i class="fa fa-info-circle"></i> {{'ITEM_CARD.INFO' | translate}}
      </button>

      <button [routerLink]="['/item/edit', item.id]" (click)="showMenu = false">
        <i class="fa fa-pen" style="color: var(--g-yellow) !important;"></i> {{'COMMON.EDIT' | translate}}
      </button>

      <button *ngIf="item.status !== 1" (click)="lend.emit(item); showMenu = false">
        <i class="fa fa-handshake" style="color: var(--g-yellow) !important;"></i> {{'ITEM_CARD.LEND' | translate}}
      </button>

      <button *ngIf="isMobile && featureService.isSalesModeEnabled()" (click)="sell.emit(item); showMenu = false">
        <i class="fa fa-dollar-sign"></i> {{'ITEM_CARD.SELL' | translate}}
      </button>

      <button (click)="requestDelete($event)" class="delete-btn">
        <i class="fa fa-trash-alt"></i> {{'ITEM_CARD.DELETE' | translate}}
      </button>
    </div>
  </div>

  <div class="item-drag-placeholder" *cdkDragPlaceholder></div>
</div>

<app-inest-modal 
  *ngIf="showDelete"
  mode="delete"
  [title]="'ITEM_CARD.DELETE'"
  [message]="'ITEM_CARD.M_YOU_SURE'"
  [confirmText]="'ITEM_CARD.DELETE'"
  [cancelText]="'COMMON.CANCEL'"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-inest-modal>
