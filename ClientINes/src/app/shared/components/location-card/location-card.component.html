<div class="location-column" 
     [style.border-top-color]="location.color"
     [class.menu-open]="location.showMenu"
     [class.is-valid-target]="isValidDropTarget"
     [class.is-invalid-target]="isInvalidDropTarget"
     [class.is-drag-over]="isDragOver" cdkDropList
     [id]="'list-loc-' + location.id"
     [cdkDropListData]="location.children!" 
     [cdkDropListConnectedTo]="connectedLocationLists"
     [cdkDropListEnterPredicate]="canDropLocation"
     (cdkDropListEntered)="onDragEntered()" 
     (cdkDropListExited)="onDragExited()"   
     (cdkDropListDropped)="onDragExited(); 
     locationDropped.emit({event: $event, targetId: location.id})" 
     [cdkDropListSortingDisabled]="true">

  <div class="loc-header-wrapper">
    <div class="main-actions-area">
      <div class="header-row top">
        <div class="title-block">
          <i [className]="'fa ' + (location.icon || 'fa-folder')" [style.color]="location.color"></i>
          <h3>{{ location.name }}</h3>
          <span class="count-badge">{{ location.items.length }}</span>
        </div>

        <div class="button-group">
          <button class="tool-btn add-item" (click)="modalService.openItemForm(null, location.id); $event.stopPropagation()" [title]="'LOCATION_CARD.BTN.ITEM' | translate">
            <i class="fa fa-plus"></i>
          </button>
          
          <button class="tool-btn add-loc" 
                  [disabled]="facade.getLocationLevel(location.id) >= 3"
                  (click)="modalService.openLocationForm(null, location.id); $event.stopPropagation()" 
                  [title]="'LOCATION_CARD.BTN.LOCATION' | translate">
            <i class="fa fa-folder-plus"></i>
          </button>

          <button class="tool-btn move-select" (click)="location.showMenu = !location.showMenu; $event.stopPropagation()">
            <i class="fa fa-exchange-alt"></i>
          </button>

          <button class="tool-btn" (click)="moveUp.emit(location); $event.stopPropagation()" [title]="'Вверх'" [disabled]="isFirst">
            <i class="fa fa-arrow-up"></i>
          </button>
          <button class="tool-btn" (click)="moveDown.emit(location); $event.stopPropagation()" [title]="'Вниз'" [disabled]="isLast">
            <i class="fa fa-arrow-down"></i>
          </button>
        </div>
      </div>

      <div class="header-row bottom">
        <button class="link-btn" [routerLink]="['/location', location.id]" (click)="$event.stopPropagation()">
          <i class="fa fa-eye"></i> {{'COMMON.INFO' | translate}}
        </button>
        <button class="link-btn" (click)="rename.emit(location); $event.stopPropagation()">
          <i class="fa fa-edit"></i> {{'COMMON.RENAME' | translate}}
        </button>
        <button class="link-btn is-danger" (click)="delete.emit(location); $event.stopPropagation()">
          <i class="fa fa-trash-alt"></i> {{'COMMON.DELETE' | translate}}
        </button>
      </div>
    </div>

    <div class="drag-handle" cdkDragHandle (click)="$event.stopPropagation()" [title]="'Зажми и тащи локацию'">
      <i class="fa fa-grip-vertical"></i>
    </div>

    <div class="quick-move-panel" *ngIf="location.showMenu" (click)="$event.stopPropagation()">
      <select (change)="onMove($event)">
        <option value="" disabled selected>{{'DROP_MENU.SELECT_LOCATION' | translate}}</option>
        <option value="root"
        [disabled]="!facade.canMoveLocation(location.id, null)">
          📁 {{'DROP_MENU.HIGHER_LEVEL' | translate}}
        </option>
        <option *ngFor="let target of flatLocations" 
                [value]="target.id" 
                [disabled]="target.id === location.id || isChildOf(target.id, location) || !facade.canMoveLocation(location.id, target.id)">
          {{ target.name }}
        </option>
      </select>
    </div>
  </div>

  <div cdkDropList [id]="location.id" [cdkDropListData]="location.items"
       [cdkDropListConnectedTo]="connectedLists" 
       [cdkDropListEnterPredicate]="canDropItem"
       (cdkDropListDropped)="onItemDrop($event)"
       class="items-container">
    
    <app-item-card *ngFor="let item of location.items; trackBy: trackById" 
      [item]="item"
      [flatLocations]="flatLocations"
      [menuOpenItemId]="openItemMenuId"
      (menuOpenedItemIdChange)="onItemMenuToggled($event)"
      (sell)="sellItem.emit($event)"
      (lend)="lendItem.emit($event)"
      (delete)="deleteItem.emit($event)"
      (move)="moveItemManual.emit($event)">
    </app-item-card>
    
    <div class="empty-placeholder" *ngIf="location.items.length === 0">
      <i class="fa fa-box-open"></i>
      <p>{{'LOCATION_CARD.EMPTY' | translate}}</p>
    </div>
  </div>

  <div class="child-locations">
    <div class="child-location-wrapper"
         *ngFor="let child of location.children; trackBy: trackById"
         cdkDrag
         [cdkDragData]="child"
         [cdkDragDisabled]="isMobile"
         (cdkDragStarted)="onDragStart(child)"  (cdkDragEnded)="onDragEnd()">          <!--<div class="location-drag-placeholder" *cdkDragPlaceholder></div>-->
      <div *cdkDragPreview class="custom-drag-preview" [style.border-color]="child.color">
        <i [className]="'fa ' + (child.icon || 'fa-folder')" [style.color]="child.color"></i>
        <span class="preview-title">{{ child.name }}</span>
      </div>

      <app-location-card 
          [location]="child"
          [flatLocations]="flatLocations"
          [connectedLists]="connectedLists"
          [connectedLocationLists]="connectedLocationLists"
          [isChildOf]="isChildOf"
          (itemDropped)="itemDropped.emit($event)"
          (locationDropped)="locationDropped.emit($event)"
          (move)="move.emit($event)"
          (moveItemManual)="moveItemManual.emit($event)" 
          (rename)="rename.emit($event)"
          (delete)="delete.emit($event)"
          (sellItem)="sellItem.emit($event)"
          (lendItem)="lendItem.emit($event)"
          (deleteItem)="deleteItem.emit($event)"
          (moveUp)="moveUp.emit($event)"    (moveDown)="moveDown.emit($event)"> </app-location-card>
    </div>
  </div>
</div>
