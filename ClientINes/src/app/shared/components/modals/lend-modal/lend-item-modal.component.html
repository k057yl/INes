<div class="modal-backdrop" *ngIf="isOpen" (click)="onCancel()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h3>🤝 {{ 'LENDING_MODAL.TITLE' | translate }} "{{ item.name }}"</h3>
      <button class="close-btn" (click)="onCancel()">×</button>
    </div>

    <form [formGroup]="lendForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        
        <div class="form-group">
          <label for="personName">{{ 'LENDING_MODAL.PERSON_NAME' | translate }} *</label>
          <input 
            type="text" 
            id="personName" 
            formControlName="personName" 
            [placeholder]="'LENDING_MODAL.PLACEHOLDER_NAME' | translate"
            [class.is-invalid]="lendForm.get('personName')?.invalid && lendForm.get('personName')?.touched"
          >
          <span class="error-text" *ngIf="lendForm.get('personName')?.invalid && lendForm.get('personName')?.touched">
            {{ 'LENDING_MODAL.ERROR_NAME_REQ' | translate }}
          </span>
        </div>

        <div class="form-group">
          <label for="valueAtLending">{{ 'LENDING_MODAL.ESTIMATED_VALUE' | translate }} ($)</label>
          <input 
            type="number" 
            id="valueAtLending" 
            formControlName="valueAtLending"
            placeholder="0"
          >
        </div>

        <div class="form-group">
          <label for="expectedReturnDate">{{ 'LENDING_MODAL.EXPECTED_RETURN' | translate }}</label>
          <input 
            type="date" 
            id="expectedReturnDate" 
            formControlName="expectedReturnDate"
          >
        </div>

        <div class="form-group">
          <label for="comment">{{ 'LENDING_MODAL.COMMENT' | translate }}</label>
          <textarea 
            id="comment" 
            formControlName="comment" 
            [placeholder]="'LENDING_MODAL.PLACEHOLDER_COMMENT' | translate"
            rows="3"
          ></textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="onCancel()">
          {{ 'COMMON.CANCEL' | translate }}
        </button>
        <button type="submit" class="btn-primary" [disabled]="lendForm.invalid">
          {{ 'COMMON.SAVE' | translate }}
        </button>
      </div>
    </form>

  </div>
</div>
