<div class="sale-card" [class.archived]="!sale.itemId">
  <div class="sale-main-info">
    <div class="item-details">
      <span class="name">{{ sale.itemName }}</span>
      <span class="platform" *ngIf="sale.platformName">
        <i class="fa fa-shopping-cart"></i> {{ sale.platformName }}
      </span>
    </div>
    <div class="date">{{ sale.soldDate | date:'dd.MM.yyyy' }}</div>
  </div>

  <div class="sale-finance">
    <div class="price">{{ sale.salePrice | number:'1.2-2' }} $</div>
    <div class="profit" [ngClass]="sale.profit >= 0 ? 'turquoise' : 'red'">
      {{ sale.profit > 0 ? '+' : '' }}{{ sale.profit | number:'1.2-2' }} $
    </div>
  </div>

  <div class="sale-actions">
    <button class="inest-action-btn" 
        *ngIf="isItemExists" 
        (click)="onUndo()"
        [title]="'SHARED.TOOLTIP_UNDO' | translate">
        ↩️
    </button>

    <button class="inest-action-btn is-danger" 
            (click)="onDelete()" 
            [title]="'SHARED.TOOLTIP_DELETE' | translate">
      ❌
    </button>
    
    <span class="archived-label" *ngIf="!sale.itemId" title="Предмет удален из инвентаря">📦💨</span>
  </div>
</div>

<div class="modal-overlay" *ngIf="showDeleteModal" (click)="closeModal()">
  <div class="custom-modal" (click)="$event.stopPropagation()">
    <h3>Удалить запись?</h3>
    <p>Выберите способ удаления для <b>{{ sale.itemName }}</b>:</p>
    
    <div class="modal-options">
      <button class="opt-btn smart" (click)="confirmDelete(true)">
        <span class="opt-icon">📥</span>
        <div class="text">
          <span class="title">Smart Delete</span>
          <span class="desc">Удалить фото и айтем, но оставить прибыль в истории.</span>
        </div>
      </button>

      <button class="opt-btn hard" (click)="confirmDelete(false)">
        <span class="opt-icon">🔥</span>
        <div class="text">
          <span class="title">Hard Delete</span>
          <span class="desc">Стереть всё полностью (включая запись о прибыли).</span>
        </div>
      </button>
    </div>

    <button class="btn-cancel" (click)="closeModal()">Отмена</button>
  </div>
</div>
