<div class="sale-card" [class.archived]="!isItemExists">
  <div class="sale-main-info">
    <div class="item-details">
      <span class="name">{{ sale.itemName }}</span>
      <span class="platform" *ngIf="sale.platformName">
        <i class="fa fa-shopping-cart"></i> {{ sale.platformName }}
      </span>
    </div>
    <div class="date">{{ sale.soldDate | date:'dd.MM.yyyy' }}</div>
  </div>

  <div class="sale-finance">
    <div class="price">{{ sale.salePrice | number:'1.2-2' }} $</div>
    <div class="profit" [ngClass]="sale.profit >= 0 ? 'text-accent' : 'text-danger'">
      {{ sale.profit > 0 ? '+' : '' }}{{ sale.profit | number:'1.2-2' }} $
    </div>
  </div>

  <div class="sale-actions">
    <button class="inest-action-btn" 
            *ngIf="isItemExists" 
            (click)="onUndo()"
            [title]="'SHARED.TOOLTIP_RENAME' | translate"> <i class="fa fa-undo-alt"></i>
    </button>

    <span class="archived-label" *ngIf="!isItemExists" [title]="'ITEMS.ERRORS.NOT_FOUND' | translate">
      <i class="fa fa-archive"></i>
    </span>

    <button class="inest-action-btn is-danger" 
            (click)="onDelete()" 
            [title]="'SHARED.TOOLTIP_DELETE' | translate">
      <i class="fa fa-trash-alt"></i>
    </button>
  </div>
</div>
